<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Connect</title>
    <link rel="stylesheet" href="assets/css/facebook.css"
  </head>
  <body>
    <div class="container">
      <div class="left">
        <img src="images/social-illustration.png" alt="Social Illustration" />

        <h1>Social Connect</h1>

        <p>
          Connect with friends, share your moments and discover what's happening
          around you.
        </p>
      </div>

      <div class="right">
        <form class="login-box">
          <input type="email" placeholder="Email address" required />

          <input type="password" placeholder="Password" required />

          <button class="login-btn">Log In</button>

          <a href="#">Forgot Password?</a>

          <hr />

          <button type="button" class="create-btn">Create New Account</button>
        </form>
      </div>
    </div>
  </body>
</html>
